<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ICML 2026 관심 페이퍼</title>
<style>
  :root{
    --ink:#1f2937; --ink2:#33415c; --slate:#475569; --muted:#94a3b8;
    --line:#e2e8f0; --line2:#eef2f6; --bg:#f8fafc; --card:#ffffff;
    --accent:#0f172a; --link:#0284c7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;font-size:14px}
  .serif{font-family:Georgia,"Times New Roman","Nanum Myeongjo",serif}
  .app{display:flex;height:100vh;overflow:hidden}

  /* sidebar */
  .side{width:256px;flex:0 0 256px;background:var(--card);border-right:1px solid var(--line);
    display:flex;flex-direction:column}
  .brand{padding:20px 20px;border-bottom:1px solid var(--line2)}
  .brand .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .brand h1{margin:4px 0 2px;font-size:20px;color:var(--accent)}
  .brand p{margin:0;font-size:12px;color:var(--muted)}
  .nav{flex:1;overflow:auto;padding:12px}
  .navlabel{padding:14px 12px 4px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#cbd5e1;font-weight:600}
  .item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;margin-bottom:2px;border:0;background:none;
    border-radius:9px;text-align:left;font-size:14px;color:var(--slate);cursor:pointer}
  .item:hover{background:#f1f5f9}
  .item.active{background:var(--accent);color:#fff}
  .item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item.accent .lbl{font-weight:600;color:var(--ink)}
  .item.active.accent .lbl,.item.active .lbl{color:#fff}
  .badge{font-size:11px;border-radius:999px;padding:1px 7px;background:#f1f5f9;color:#64748b}
  .item.active .badge{background:rgba(255,255,255,.2);color:#fff}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--line)}
  .topbar h2{margin:0;font-size:24px;color:var(--accent)}
  .topbar .sub{font-size:13px;color:var(--muted)}
  .grow{margin-right:auto}
  .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--slate);
    padding:8px 13px;border-radius:9px;font-size:13px;cursor:pointer}
  .btn:hover{background:#f8fafc}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
  .btn.primary:hover{background:#1e293b}
  .search{position:relative}
  .search input{width:220px;padding:8px 12px 8px 30px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff}
  .search input:focus{outline:none;border-color:#94a3b8}
  .search svg{position:absolute;left:9px;top:9px;color:var(--muted)}
  .filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:11px 24px;background:#fff;border-bottom:1px solid var(--line2)}
  .filterbar .cap{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .chip{border:1px solid var(--line);background:#fff;color:#94a3b8;border-radius:999px;padding:3px 11px;font-size:12px;font-weight:500;cursor:pointer}
  .chip:hover{color:#475569}
  .pill,.chip.on{display:inline-flex;align-items:center;gap:6px}
  .pill{border-radius:999px;padding:2px 10px;font-size:12px;font-weight:500;border:1px solid}
  .dot{width:6px;height:6px;border-radius:999px;display:inline-block}
  .pill.Oral,.chip.on.Oral{background:#fce8e6;color:#b4452f;border-color:#f3c9c1}
  .pill.Spotlight,.chip.on.Spotlight{background:#faf0d6;color:#9a6b12;border-color:#ecd9a6}
  .pill.Poster,.chip.on.Poster{background:#deecf3;color:#2d6b8c;border-color:#bcd9e7}
  .pill.Workshop,.chip.on.Workshop{background:#e9e3f4;color:#5e4a93;border-color:#d3c6ea}
  .dot.Oral{background:#e0563f}.dot.Spotlight{background:#d39b27}.dot.Poster{background:#3f86ad}.dot.Workshop{background:#7a63b0}

  .scroll{flex:1;min-height:0;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{position:sticky;top:0;z-index:5;background:#f8fafcee;backdrop-filter:blur(4px);
    text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#64748b;font-weight:600;
    padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:#1e293b}
  thead th .arr{opacity:.4;margin-left:3px}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line2);vertical-align:top}
  tbody tr:hover{background:#f8fafc99}
  .nm{font-weight:600;color:#334155;background:none;border:0;cursor:pointer;padding:0}
  .nm:hover{text-decoration:underline}
  .num{font-variant-numeric:tabular-nums;color:#64748b}
  .dim{color:#cbd5e1}
  a.link{color:var(--link);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  a.link:hover{text-decoration:underline}

  /* editable student table */
  .cellinput{width:100%;border:0;background:none;padding:5px 6px;border-radius:6px;font-size:14px;color:#334155;font-family:inherit}
  .cellinput::placeholder{color:#cbd5e1}
  .cellinput:focus{outline:none;background:#fff;box-shadow:0 0 0 1px #cbd5e1}
  .typecell{position:relative}
  .typebtn{display:flex;align-items:center;justify-content:space-between;gap:4px;width:100%;border:0;background:none;
    padding:5px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:#94a3b8}
  .typebtn:hover{background:#f1f5f9}
  .menu{position:absolute;z-index:30;margin-top:4px;width:150px;background:#fff;border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 30px rgba(15,23,42,.12);padding:5px}
  .menu button{display:flex;align-items:center;gap:7px;width:100%;border:0;background:none;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:#475569}
  .menu button:hover{background:#f1f5f9}
  .del{border:0;background:none;color:#cbd5e1;cursor:pointer;padding:5px;border-radius:6px}
  .del:hover{background:#fee2e2;color:#ef4444}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:80px 24px;color:#64748b}
  .empty .icon{width:48px;height:48px;border-radius:999px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#94a3b8}
  .empty p{max-width:360px;margin:0;font-size:14px}

  .status{font-size:12px;color:#059669}
  .banner{padding:9px 24px;font-size:12.5px;background:#fffbeb;color:#92704e;border-bottom:1px solid #fde9c8}
  .banner b{color:#7a5a32}
  .mobsel{display:none;padding:12px;background:#fff;border-bottom:1px solid var(--line)}
  .mobsel select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  @media(max-width:760px){ .side{display:none} .mobsel{display:block} .search input{width:150px} }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="eyebrow">ICML 2026</div>
      <h1 class="serif">관심 페이퍼</h1>
      <p>학생별 발표 일정 모아보기</p>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <div class="mobsel"><select id="mobsel"></select></div>
    <div id="banner"></div>
    <div id="content" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>
  </main>
</div>

<script>
/* ============================================================
   설정: 구글 시트 백엔드(Apps Script 웹앱) 주소를 여기에 붙여 넣으세요.
   비워두면 이 브라우저에만 저장되는 "로컬 모드"로 동작합니다.
   ============================================================ */
const API_URL = ""; // 예: "https://script.google.com/macros/s/AKfyc.../exec"

const NAMES = ["송채희","이금용","박동현","홍건하","안성규","Saad Mourafik","김재훈","김강현",
  "박범훈","조성원","박성준","송지훈","서경국","신상훈","이승아","장유진","여상엽","김범준","Willmer Rafell","허은우"];
const TYPES = ["Oral","Spotlight","Poster","Workshop"];
const TYPE_ORDER = {Oral:0,Spotlight:1,Poster:2,Workshop:3};
const COLDEF = [
  {f:"paperNo",label:"고유 번호",ph:"예: 12345",w:"110px"},
  {f:"task",label:"주제 (Task)",ph:"예: Robustness",w:"160px"},
  {f:"title",label:"페이퍼 명 (Title)",ph:"논문 제목",w:"320px"},
  {f:"date",label:"날짜",ph:"Jul 14",w:"110px"},
  {f:"day",label:"요일",ph:"Tue",w:"70px"},
  {f:"time",label:"시간 (KST)",ph:"03:15",w:"90px"},
  {f:"location",label:"위치 / 세션",ph:"Poster Session 2, Hall A",w:"260px"},
  {f:"link",label:"링크",ph:"https://…",w:"220px"},
];
const MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
const LS_KEY="icml2026_rows_v1";
const REMOTE=!!API_URL;

let state={ rows:[], view:"all", sort:{key:"date",dir:"asc"}, query:"", tf:new Set(), loading:true, error:null };
let saveTimers={};

/* ---------- data layer ---------- */
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function blankRow(student){return {id:uid(),student,type:"",paperNo:"",task:"",title:"",date:"",day:"",time:"",location:"",link:"",updatedAt:Date.now()}}

async function apiGet(){ const r=await fetch(API_URL+"?action=list"); const j=await r.json(); return j.rows||[] }
async function apiPost(action,payload){
  const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(Object.assign({action},payload))});
  const j=await r.json(); return j.rows||null;
}
function loadLocal(){ try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]")}catch(e){return[]} }
function saveLocal(){ try{localStorage.setItem(LS_KEY,JSON.stringify(state.rows))}catch(e){} }

async function loadAll(){
  state.loading=true; render();
  try{ state.rows = REMOTE ? await apiGet() : loadLocal(); state.error=null; }
  catch(e){ state.error="데이터를 불러오지 못했습니다. 백엔드 주소를 확인해 주세요."; }
  state.loading=false; render();
}
function flash(){ const s=document.getElementById("status"); if(s){s.style.opacity=1; clearTimeout(flash._t); flash._t=setTimeout(()=>{s.style.opacity=0},1500);} }

function upsertRow(row){
  row.updatedAt=Date.now();
  const i=state.rows.findIndex(r=>r.id===row.id);
  if(i>=0) state.rows[i]=row; else state.rows.push(row);
  if(REMOTE){ apiPost("upsert",{row}).then(()=>flash()).catch(()=>{}); }
  else { saveLocal(); flash(); }
}
function deleteRow(id){
  state.rows=state.rows.filter(r=>r.id!==id);
  if(REMOTE){ apiPost("delete",{id}).then(()=>flash()).catch(()=>{}); } else { saveLocal(); flash(); }
}

/* ---------- helpers ---------- */
function rowsOf(name){return state.rows.filter(r=>r.student===name)}
function counts(){const c={};let t=0;NAMES.forEach(n=>{c[n]=rowsOf(n).length;t+=c[n]});return {c,t}}
function dateNum(s){ if(!s)return 1e9; const m=String(s).toLowerCase().match(/([a-z]{3,})\s*\.?\s*0*(\d{1,2})/);
  if(m&&MONTHS[m[1].slice(0,3)]) return MONTHS[m[1].slice(0,3)]*100+parseInt(m[2],10);
  const n=String(s).replace(/\D/g,""); return n?parseInt(n.slice(0,6),10):1e9; }
function timeNum(s){ if(!s)return 1e9; const m=String(s).match(/(\d{1,2}):(\d{2})/); return m?+m[1]*60+ +m[2]:1e9 }
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function ic(p){return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`}
const I={plus:ic('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'),
  trash:ic('<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>'),
  ext:ic('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'),
  search:ic('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'),
  cal:ic('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
  dl:ic('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>'),
  chev:ic('<polyline points="6 9 12 15 18 9"/>'),
  refresh:ic('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>')};
function pill(t){ if(!t) return '<span class="dim">—</span>';
  return `<span class="pill ${esc(t)}"><span class="dot ${esc(t)}"></span>${esc(t)}</span>` }

/* ---------- render ---------- */
function render(){ renderNav(); renderBanner(); renderContent(); }

function renderBanner(){
  const b=document.getElementById("banner");
  if(!REMOTE){ b.innerHTML=`<div class="banner">⚠ <b>로컬 모드</b> — 입력이 이 브라우저에만 저장됩니다. 설정 가이드에 따라 구글 시트 백엔드 주소를 <code>API_URL</code>에 입력해 주세요.</div>`; }
  else if(state.error){ b.innerHTML=`<div class="banner">⚠ ${esc(state.error)}</div>`; }
  else b.innerHTML="";
}

function renderNav(){
  const {c,t}=counts();
  const item=(active,key,label,badge,accent,icon)=>`<button class="item ${active?'active':''} ${accent?'accent':''}" data-view="${esc(key)}">
    ${icon?`<span style="display:flex;color:${active?'#fff':'#94a3b8'}">${icon}</span>`:''}
    <span class="lbl">${esc(label)}</span>${badge>0?`<span class="badge">${badge}</span>`:''}</button>`;
  let html=item(state.view==="all","all","전체 일정",t,true,I.cal);
  html+=`<div class="navlabel">학생</div>`;
  NAMES.forEach(n=>{ html+=item(state.view===n,n,n,c[n],false,""); });
  const nav=document.getElementById("nav"); nav.innerHTML=html;
  nav.querySelectorAll(".item").forEach(b=>b.onclick=()=>{ state.view=b.dataset.view; if(state.view==="all"&&REMOTE) loadAll(); else render(); });
  const ms=document.getElementById("mobsel");
  ms.innerHTML=`<option value="all">전체 일정 (${t})</option>`+NAMES.map(n=>`<option value="${esc(n)}" ${state.view===n?'selected':''}>${esc(n)} (${c[n]})</option>`).join("");
  ms.value=state.view; ms.onchange=()=>{state.view=ms.value;render()};
}

function renderContent(){
  const el=document.getElementById("content");
  if(state.loading){ el.innerHTML=`<div class="empty"><p>불러오는 중…</p></div>`; return; }
  if(state.view==="all") renderCombined(el); else renderStudent(el);
}

function renderCombined(el){
  const q=state.query.trim().toLowerCase();
  let rows=state.rows.slice();
  rows=rows.filter(r=>{
    if(state.tf.size && !state.tf.has(r.type)) return false;
    if(q){ const hay=`${r.student} ${r.type} ${r.paperNo} ${r.task} ${r.title} ${r.location}`.toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  const k=state.sort.key, dir=state.sort.dir==="asc"?1:-1;
  const val=r=> k==="date"?dateNum(r.date)*10000+timeNum(r.time) : k==="time"?timeNum(r.time) : k==="type"?(TYPE_ORDER[r.type]??9) : String(r[k]||"").toLowerCase();
  rows.sort((a,b)=>{const va=val(a),vb=val(b); let cmp= (typeof va==="number"&&typeof vb==="number")?va-vb:String(va).localeCompare(String(vb),"ko"); return cmp*dir;});

  const arr=key=> state.sort.key===key?`<span class="arr">${state.sort.dir==="asc"?"↑":"↓"}</span>`:`<span class="arr">↕</span>`;
  const th=(key,label)=>`<th class="sortable" data-k="${key}">${label}${arr(key)}</th>`;

  const head=`
   <div class="topbar">
     <div class="grow"><h2 class="serif">전체 일정</h2><div class="sub">${rows.length}편 · 헤더를 눌러 정렬</div></div>
     <span id="status" class="status" style="opacity:0">저장됨</span>
     <div class="search">${I.search}<input id="q" placeholder="제목·주제·학생 검색" value="${esc(state.query)}"></div>
     <button class="btn" id="refresh">${I.refresh} 새로고침</button>
     <button class="btn" id="csv">${I.dl} CSV</button>
   </div>
   <div class="filterbar">
     <span class="cap">형식</span>
     ${TYPES.map(t=>`<button class="chip ${state.tf.has(t)?'on '+t:''}" data-t="${t}">${t}</button>`).join("")}
     ${state.tf.size?`<button class="btn" id="clr" style="padding:2px 8px;font-size:12px">초기화</button>`:""}
   </div>`;

  let body;
  if(rows.length===0){
    body=`<div class="empty"><div class="icon">${I.cal}</div><p>${state.rows.length===0?"아직 등록된 페이퍼가 없습니다. 왼쪽에서 이름을 골라 추가해 보세요.":"조건에 맞는 페이퍼가 없습니다. 필터를 바꿔 보세요."}</p></div>`;
  } else {
    body=`<div class="scroll"><table><thead><tr>
      ${th("student","학생")}${th("type","형식")}${th("paperNo","번호")}${th("task","주제")}${th("title","페이퍼 명")}
      ${th("date","날짜")}${th("day","요일")}${th("time","시간")}${th("location","위치 / 세션")}<th>링크</th>
    </tr></thead><tbody>${rows.map(r=>`<tr>
      <td><button class="nm" data-jump="${esc(r.student)}">${esc(r.student)}</button></td>
      <td>${pill(r.type)}</td>
      <td class="num">${r.paperNo?esc(r.paperNo):'<span class="dim">—</span>'}</td>
      <td>${r.task?esc(r.task):'<span class="dim">—</span>'}</td>
      <td>${r.title?esc(r.title):'<span class="dim">제목 미입력</span>'}</td>
      <td>${r.date?esc(r.date):'<span class="dim">—</span>'}</td>
      <td style="color:#64748b">${r.day?esc(r.day):'<span class="dim">—</span>'}</td>
      <td class="num">${r.time?esc(r.time):'<span class="dim">—</span>'}</td>
      <td>${r.location?esc(r.location):'<span class="dim">—</span>'}</td>
      <td>${r.link?`<a class="link" href="${esc(r.link)}" target="_blank" rel="noreferrer">열기 ${I.ext}</a>`:'<span class="dim">—</span>'}</td>
    </tr>`).join("")}</tbody></table></div>`;
  }
  el.innerHTML=head+body;

  el.querySelectorAll("th.sortable").forEach(t=>t.onclick=()=>{const k=t.dataset.k;
    state.sort = state.sort.key===k?{key:k,dir:state.sort.dir==="asc"?"desc":"asc"}:{key:k,dir:"asc"}; renderContent();});
  el.querySelectorAll(".chip[data-t]").forEach(c=>c.onclick=()=>{const t=c.dataset.t; state.tf.has(t)?state.tf.delete(t):state.tf.add(t); renderContent();});
  const clr=el.querySelector("#clr"); if(clr) clr.onclick=()=>{state.tf.clear();renderContent()};
  el.querySelectorAll(".nm[data-jump]").forEach(n=>n.onclick=()=>{state.view=n.dataset.jump;render()});
  const qi=el.querySelector("#q"); qi.oninput=()=>{state.query=qi.value; const car=qi.selectionStart; renderContent(); const nq=document.getElementById("q"); if(nq){nq.focus(); nq.setSelectionRange(car,car);} };
  el.querySelector("#refresh").onclick=loadAll;
  el.querySelector("#csv").onclick=()=>exportCsv(rows);
}

function exportCsv(rows){
  const head=["학생","발표형식","고유번호","주제","페이퍼 명","날짜","요일","시간(KST)","위치/세션","링크"];
  const cell=v=>`"${String(v||"").replace(/"/g,'""')}"`;
  const lines=[head.map(cell).join(",")];
  rows.forEach(r=>lines.push([r.student,r.type,r.paperNo,r.task,r.title,r.date,r.day,r.time,r.location,r.link].map(cell).join(",")));
  const blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="ICML2026_관심페이퍼.csv"; a.click(); URL.revokeObjectURL(a.href);
}

function renderStudent(el){
  const name=state.view; const rows=rowsOf(name);
  const head=`<div class="topbar">
     <div class="grow"><h2 class="serif">${esc(name)}</h2><div class="sub">${rows.length}편 · 보고 싶은 페이퍼를 입력하세요</div></div>
     <span id="status" class="status" style="opacity:0">저장됨</span>
     <button class="btn primary" id="add">${I.plus} 페이퍼 추가</button>
   </div>`;
  let body;
  if(rows.length===0){
    body=`<div class="empty"><div class="icon">${I.cal}</div><p>아직 추가한 페이퍼가 없습니다. "페이퍼 추가"를 눌러 시작하세요.</p>
      <button class="btn primary" id="add2">${I.plus} 페이퍼 추가</button></div>`;
  } else {
    body=`<div class="scroll"><table><thead><tr>
      <th style="width:130px">발표 형식</th>
      ${COLDEF.map(c=>`<th style="width:${c.w}">${c.label}</th>`).join("")}
      <th style="width:44px"></th></tr></thead><tbody>
      ${rows.map(r=>`<tr data-id="${r.id}">
        <td class="typecell">
          <button class="typebtn" data-type-btn>${r.type?pill(r.type):'선택'} ${I.chev}</button>
        </td>
        ${COLDEF.map(c=>`<td><input class="cellinput" data-field="${c.f}" placeholder="${esc(c.ph)}" value="${esc(r[c.f])}"></td>`).join("")}
        <td style="text-align:center"><button class="del" data-del title="삭제">${I.trash}</button></td>
      </tr>`).join("")}
    </tbody></table></div>`;
  }
  el.innerHTML=head+body;
  const add=()=>{ upsertRow(blankRow(name)); render(); };
  const a1=el.querySelector("#add"); if(a1)a1.onclick=add;
  const a2=el.querySelector("#add2"); if(a2)a2.onclick=add;

  el.querySelectorAll("tr[data-id]").forEach(tr=>{
    const id=tr.dataset.id;
    tr.querySelectorAll("input.cellinput").forEach(inp=>{
      inp.addEventListener("input",()=>{ const row=state.rows.find(r=>r.id===id); if(!row)return;
        row[inp.dataset.field]=inp.value;
        clearTimeout(saveTimers[id]); saveTimers[id]=setTimeout(()=>upsertRow(row),450); });
    });
    tr.querySelector("[data-del]").onclick=()=>{ deleteRow(id); render(); };
    const tb=tr.querySelector("[data-type-btn]");
    tb.onclick=(e)=>{ e.stopPropagation(); openTypeMenu(tb,id); };
  });
}

function openTypeMenu(btn,id){
  closeMenus();
  const m=document.createElement("div"); m.className="menu";
  m.innerHTML=["",...TYPES].map(t=>`<button data-v="${t}">${t?pill(t):'<span class="dim">비우기</span>'}</button>`).join("");
  btn.parentNode.appendChild(m);
  m.querySelectorAll("button").forEach(b=>b.onclick=()=>{ const row=state.rows.find(r=>r.id===id); if(row){row.type=b.dataset.v; upsertRow(row);} closeMenus(); render(); });
  setTimeout(()=>document.addEventListener("mousedown",closeMenus,{once:true}),0);
}
function closeMenus(){ document.querySelectorAll(".menu").forEach(m=>m.remove()); }

loadAll();
</script>
